# ============================================================
#  ShopOS - LOCAL Docker test (no Nginx, no SSL)
#
#  Tests the production Docker image on your PC using the
#  local Supabase stack that is already running.
#
#  Usage:
#    docker compose -f docker-compose.docker-local.yml up --build
#  Then open:
#    http://localhost:3001
#
#  Stop:
#    docker compose -f docker-compose.docker-local.yml down
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* vars must be baked in at build time.
      args:
        NEXT_PUBLIC_SUPABASE_URL: "http://172.17.0.1:54321"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0"
        NEXT_PUBLIC_APP_URL: "http://localhost:3001"
        NEXT_PUBLIC_APP_ENV: "production"
        NEXT_PUBLIC_DEFAULT_LOCALE: "en-IE"
        NEXT_PUBLIC_DEFAULT_CURRENCY: "EUR"
        NEXT_PUBLIC_DEFAULT_TIMEZONE: "Europe/Dublin"
        NEXT_PUBLIC_DEFAULT_COUNTRY: "IE"
    container_name: shopos-local-docker
    # Expose on 3001 so it doesn't clash with `npm run dev` on 3000.
    ports:
      - "3001:3000"
    # Runtime env vars (server secrets - never baked into the image).
    env_file: .env.docker-local
    # Supabase is running on the host; this alias lets the container
    # reach 172.17.0.1 via host.docker.internal too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
